<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MagicCast — TikTok connect</title>

  <!-- ============================================================
       TIKTOK DOMAIN VERIFICATION
       When you add this URL as a redirect/property in TikTok for
       Developers, TikTok offers a "meta tag" verification option and
       gives you a value. Paste that value into content="" below and
       re-upload this file, then click Verify in the TikTok portal.
       (If TikTok instead gives you a downloadable .txt file, upload
       THAT file to this same repo root and use the file method.)
       ============================================================ -->
  <meta name="tiktok-developers-site-verification" content="PASTE_TIKTOK_VERIFICATION_VALUE_HERE">

  <style>
    :root { color-scheme: light dark; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
           font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           background:#0f0f12; color:#f5f5f7; }
    .card { width:min(560px,92vw); background:#1c1c20; border:1px solid #2c2c32;
            border-radius:16px; padding:28px 26px; box-shadow:0 10px 40px rgba(0,0,0,.4); }
    h1 { font-size:18px; margin:0 0 4px; }
    .sub { color:#a6a6ab; font-size:13px; margin:0 0 20px; }
    .label { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#a6a6ab; margin-bottom:6px; }
    .code { font-family:ui-monospace,Menlo,monospace; font-size:15px; word-break:break-all;
            background:#0f0f12; border:1px solid #2c2c32; border-radius:10px; padding:14px; }
    button { margin-top:14px; width:100%; padding:12px; font-size:15px; font-weight:600;
             border:0; border-radius:10px; background:#a78bfa; color:#15121f; cursor:pointer; }
    button:active { transform:translateY(1px); }
    .ok { color:#30d158; }
    .err { color:#ff9f0a; }
    .hint { font-size:12px; color:#a6a6ab; margin-top:16px; line-height:1.5; }
    .full { font-size:11px; color:#6e6e73; margin-top:10px; word-break:break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎬 MagicCast — TikTok connect</h1>
    <p class="sub">TikTok sent you back here after you approved. Copy the code below and paste it into MagicCast → Settings → TikTok → Connect.</p>

    <div class="label">Authorization code</div>
    <div class="code" id="code">—</div>
    <button id="copy">Copy code</button>

    <div class="full" id="full"></div>
    <p class="hint" id="hint"></p>
  </div>

  <script>
    (function () {
      var q = new URLSearchParams(location.search);
      var code = q.get('code') || '';
      var err  = q.get('error') || q.get('error_description') || '';
      var codeEl = document.getElementById('code');
      var hintEl = document.getElementById('hint');
      var fullEl = document.getElementById('full');
      var btn    = document.getElementById('copy');

      if (code) {
        codeEl.textContent = code;
        hintEl.innerHTML = '<span class="ok">✓ Got it.</span> You can also paste this whole page URL into the app — it reads the code either way.';
        fullEl.textContent = location.href;
      } else if (err) {
        codeEl.textContent = err;
        codeEl.className = 'code err';
        hintEl.innerHTML = '<span class="err">TikTok returned an error (not a code).</span> Most common cause: the redirect URI here doesn\'t exactly match the one registered in your TikTok app.';
        btn.style.display = 'none';
      } else {
        codeEl.textContent = 'No code in the URL yet.';
        hintEl.textContent = 'This page only shows a code after TikTok redirects you here during the connect flow. If you opened it directly, that\'s expected.';
        btn.style.display = 'none';
      }

      btn.addEventListener('click', function () {
        navigator.clipboard.writeText(code).then(function () {
          btn.textContent = 'Copied ✓';
          setTimeout(function () { btn.textContent = 'Copy code'; }, 1800);
        }).catch(function () {
          var r = document.createRange(); r.selectNode(codeEl);
          getSelection().removeAllRanges(); getSelection().addRange(r);
        });
      });
    })();
  </script>
</body>
</html>
